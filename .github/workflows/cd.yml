name: CD (Deployment)

on:
  push:
    branches: [ "main" ]

# Concurrency to prevent multiple deployments at the same time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd CoreFE
          
          # Pull latest code
          git pull origin main
          
          # Build and restart containers with near-zero downtime
          # --build: Build images before starting containers.
          # --remove-orphans: Remove containers for services not defined in the Compose file.
          docker compose up -d --build --remove-orphans
          
          # Clean up unused images to save disk space
          docker image prune -af
          
          # Health check (localhost is more robust than hardcoded IP)
          echo "Waiting for service to start..."
          sleep 5
          docker compose ps
          curl -f http://localhost:5173/ || { echo "Health check failed"; exit 1; }
          echo "Deployment successful!"