name: CD (Deployment)

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          set -o pipefail

          echo "📂 Navigating to project directory..."
          cd CoreFE || { echo "❌ Failed to cd into CoreFE"; exit 1; }

          echo "🏷️ Tagging current image as backup..."
          docker tag corefe-core-fe:latest corefe-core-fe:backup 2>/dev/null || echo "⚠️ No existing image to backup"


          # echo "🔍 Debug SSH GitHub..."
          # ssh -vT git@github.com

          echo "📥 Pulling latest code..."
          git pull origin main || { echo "❌ Git pull failed"; exit 1; }

          # GIT_SSH_COMMAND="ssh -i /home/ec2-user/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          # git pull origin main || { echo "❌ Git pull failed"; exit 1; }

          echo "🏗️ Building and starting containers..."
          docker compose up -d --build --remove-orphans || { echo "❌ Docker compose failed"; exit 1; }

          echo "🧹 Cleaning up old images..."
          docker image prune || echo "⚠️ Image prune warning (non-critical)"

          echo "⏳ Waiting for service to start..."
          sleep 10

          echo "🔍 Checking container status..."
          docker compose ps

          echo "🏥 Health check..."
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f http://localhost:5173/ > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              echo "🎉 Deployment successful!"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Retry $RETRY_COUNT/$MAX_RETRIES..."
            sleep 3
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "📋 Container logs:"
          docker compose logs --tail=50
          exit 1